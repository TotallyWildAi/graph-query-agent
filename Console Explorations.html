<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Console / Ask — Hi-fi layout variations</title>
<link rel="stylesheet" href="assets/colors_and_type.css">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  /* ============================================================
     ORCHESTRATION CONSOLE — shared component preview (clean mode)
     Built on TW tokens. Status encoding:
       read  = green (calm)   write = amber (side-effect)
       error = marker red     accent/info = cyan
     ============================================================ */
  .oc{
    --read:        var(--accent-green);
    --read-soft:   var(--accent-green-soft);
    --write:       #C98A2B;            /* darker amber for legibility */
    --write-soft:  var(--accent-yellow-soft);
    --err:         var(--marker);
    --err-soft:    var(--marker-soft);
    --accent:      var(--accent-cyan);
    --hair:        var(--ink-line);

    font-family: var(--font-body);
    color: var(--ink);
    background: var(--paper);
    width: 100%; height: 100%;
    display: grid;
    grid-template-columns: 212px 1fr;
    overflow: hidden;
    /* clean-mode radii */
    --r-sm: 6px; --r-md: 8px; --r-lg: 10px;
  }

  /* ---- left rail (shared) ---- */
  .oc-rail{ background: var(--paper-warm); border-right: 1.5px solid var(--ink-line); padding: 18px 14px; display:flex; flex-direction:column; gap: 4px; }
  .oc-brand{ display:flex; align-items:center; gap:9px; margin-bottom: 20px; padding: 0 4px; }
  .oc-brand img{ width: 30px; height: 30px; }
  .oc-brand .wm{ font-family: var(--font-display); font-weight:700; font-size: 21px; line-height:1; }
  .oc-brand .wm small{ display:block; font-family: var(--font-mono); font-size: 9px; letter-spacing:.18em; text-transform:uppercase; color: var(--ink-faint); font-weight:400; margin-top:2px; }
  .oc-navgrp{ font-family: var(--font-mono); font-size: 9.5px; letter-spacing:.16em; text-transform:uppercase; color: var(--ink-faint); margin: 16px 6px 6px; }
  .oc-nav{ display:flex; align-items:center; gap:10px; padding: 8px 10px; border-radius: var(--r-md); font-size: 13px; color: var(--ink-soft); cursor:default; }
  .oc-nav i{ font-size: 16px; }
  .oc-nav.on{ background: var(--card); border:1.5px solid var(--ink); color: var(--ink); font-weight:600; box-shadow: var(--shadow-press); }
  .oc-rail-foot{ margin-top:auto; padding: 10px; border:1.5px dashed var(--ink-line); border-radius: var(--r-md); font-size: 11px; color: var(--ink-faint); line-height:1.4; }

  /* ---- main column ---- */
  .oc-main{ overflow:hidden; display:flex; flex-direction:column; }
  .oc-top{ display:flex; align-items:center; gap:12px; padding: 14px 26px; border-bottom: 1.5px solid var(--ink-line); background: rgba(244,241,232,0.6); }
  .oc-top .crumb{ font-family: var(--font-mono); font-size: 12px; color: var(--ink-soft); }
  .oc-top .crumb b{ color: var(--ink); }
  .oc-spacer{ flex:1; }
  .oc-meta{ font-family: var(--font-mono); font-size: 11px; color: var(--ink-soft); background: var(--card); border:1.5px solid var(--ink-line); border-radius: var(--r-sm); padding: 5px 10px; }
  .oc-meta b{ color: var(--ink); font-weight:500; }
  .oc-body{ padding: 26px; overflow:hidden; flex:1; }

  /* ---- request box ---- */
  .oc-eyebrow{ font-family: var(--font-mono); font-size: 10.5px; letter-spacing:.14em; text-transform:uppercase; color: var(--ink-faint); margin-bottom: 8px; display:block; }
  .oc-reqbox{ background: var(--card); border:1.5px solid var(--ink); border-radius: var(--r-md); box-shadow: var(--shadow-rest); padding: 16px 18px; display:flex; align-items:center; gap:14px; }
  .oc-reqbox .q{ flex:1; font-size: 19px; font-weight:500; color: var(--ink); letter-spacing: -0.01em; }
  .oc-reqbox.cmd{ font-family: var(--font-mono); }
  .oc-reqbox.cmd .q{ font-family: var(--font-mono); font-size: 16px; font-weight:400; }
  .oc-reqbox .promptmark{ color: var(--accent); font-family: var(--font-mono); font-weight:600; }

  /* ---- buttons ---- */
  .oc-btn{ display:inline-flex; align-items:center; gap:8px; padding: 10px 18px; border-radius: var(--r-md); border:1.5px solid var(--ink); background: var(--card); font-family: var(--font-body); font-size: 13px; font-weight:600; color: var(--ink); cursor:pointer; box-shadow: var(--shadow-rest); white-space:nowrap; }
  .oc-btn.primary{ background: var(--ink); color: var(--card); }
  .oc-btn.ghost{ border-color: transparent; background: transparent; box-shadow:none; color: var(--ink-soft); font-weight:500; }
  .oc-link{ color: var(--accent); font-size: 12.5px; font-weight:500; cursor:pointer; text-decoration: underline; text-underline-offset: 3px; }

  /* ---- pills ---- */
  .oc-pill{ display:inline-flex; align-items:center; gap:6px; font-family: var(--font-mono); font-size: 10.5px; letter-spacing:.04em; text-transform:uppercase; border-radius: 999px; padding: 3px 10px; border:1.5px solid; }
  .oc-pill.read{ color: #2F6B53; border-color: var(--read); background: var(--read-soft); }
  .oc-pill.write{ color: #8A5B12; border-color: var(--write); background: var(--write-soft); }
  .oc-pill.err{ color: var(--err); border-color: var(--err); background: var(--err-soft); }
  .oc-pill.dim{ color: var(--ink-soft); border-color: var(--ink-line); background: var(--card); }
  .oc-pill .dot{ width:6px; height:6px; border-radius:50%; background: currentColor; }

  /* ---- intent card / confidence ---- */
  .oc-intent-name{ font-family: var(--font-mono); font-size: 15px; font-weight:500; color: var(--ink); }
  .oc-conf{ display:flex; align-items:center; gap:10px; }
  .oc-conf .track{ height: 8px; border:1.5px solid var(--ink); border-radius:999px; overflow:hidden; background: var(--card); }
  .oc-conf .fill{ height:100%; background: var(--accent); }
  .oc-conf .num{ font-family: var(--font-mono); font-size: 13px; font-weight:500; }
  .oc-conf .lbl{ font-family: var(--font-mono); font-size: 10px; letter-spacing:.1em; text-transform:uppercase; color: var(--ink-faint); }

  /* editable param chip */
  .oc-chip{ display:inline-flex; align-items:center; gap:8px; font-family: var(--font-mono); font-size: 12.5px; border:1.5px solid var(--ink); border-radius: var(--r-sm); padding: 6px 8px 6px 11px; background: var(--card); box-shadow: var(--shadow-press); }
  .oc-chip .key{ color: var(--ink-faint); }
  .oc-chip .val{ color: var(--ink); font-weight:500; }
  .oc-chip .edit{ display:grid; place-items:center; width:20px; height:20px; border-radius:5px; border:1.5px solid var(--ink-line); color: var(--ink-soft); font-size:11px; }
  .oc-chip .resolved{ font-size: 9px; color:#2F6B53; border:1.5px solid var(--read); border-radius:4px; padding:1px 5px; text-transform:uppercase; letter-spacing:.06em; }

  /* ---- code / mono block ---- */
  .oc-code{ font-family: var(--font-mono); font-size: 11.5px; line-height:1.6; color: var(--ink-soft); background: var(--card-sunk); border:1.5px solid var(--ink-line); border-radius: var(--r-sm); padding: 12px 14px; white-space:pre; overflow:auto; }
  .oc-code .kw{ color: var(--accent-violet); } .oc-code .pm{ color: var(--accent); }

  /* ---- step tracker (vertical) ---- */
  .oc-steps{ display:flex; flex-direction:column; }
  .oc-step{ display:flex; gap:14px; padding: 11px 0; position:relative; }
  .oc-step .mk{ width:26px; height:26px; border-radius:50%; border:1.5px solid var(--ink); background: var(--card); display:grid; place-items:center; font-family: var(--font-mono); font-size:11px; flex:none; z-index:1; }
  .oc-step .mk.done{ background: var(--ink); color: var(--card); }
  .oc-step .mk.run{ border-color: var(--accent); color: var(--accent); border-style: solid; box-shadow: 0 0 0 4px var(--accent-cyan-soft); }
  .oc-step:not(:last-child) .mk::after{ content:""; position:absolute; left:13px; top:37px; width:1.5px; height:calc(100% - 26px); background: var(--ink-line); }
  .oc-step .st{ flex:1; padding-top:1px; }
  .oc-step .st .t{ font-size: 13.5px; font-weight:500; color: var(--ink); display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .oc-step .st .d{ font-family: var(--font-mono); font-size: 11px; color: var(--ink-faint); margin-top:3px; }
  .oc-step.is-run .st .t{ font-weight:600; }
  .oc-step.pending{ opacity:.5; }

  /* mini read-only badge inline */
  .oc-ro{ font-family: var(--font-mono); font-size:9px; letter-spacing:.06em; text-transform:uppercase; color:#2F6B53; border:1.5px solid var(--read); background:var(--read-soft); border-radius:4px; padding:1px 6px; }

  /* ---- horizontal pipeline (variation C) ---- */
  .oc-pipe{ display:flex; align-items:stretch; gap:0; }
  .oc-pnode{ flex:1; display:flex; flex-direction:column; gap:8px; align-items:flex-start; padding: 14px 16px; border:1.5px solid var(--ink-line); border-right:none; background: var(--card); position:relative; }
  .oc-pnode:first-child{ border-radius: var(--r-md) 0 0 var(--r-md); }
  .oc-pnode:last-child{ border-radius: 0 var(--r-md) var(--r-md) 0; border-right:1.5px solid var(--ink-line); }
  .oc-pnode .pn-top{ display:flex; align-items:center; gap:8px; width:100%; }
  .oc-pnode .pn-mk{ width:22px; height:22px; border-radius:50%; border:1.5px solid var(--ink); display:grid; place-items:center; font-family:var(--font-mono); font-size:10px; background:var(--card); }
  .oc-pnode .pn-mk.done{ background:var(--ink); color:var(--card); }
  .oc-pnode .pn-t{ font-size:12px; font-weight:600; line-height:1.2; }
  .oc-pnode .pn-d{ font-family:var(--font-mono); font-size:10px; color:var(--ink-faint); }
  .oc-pnode.run{ border:1.5px solid var(--accent); background: var(--accent-cyan-soft); z-index:1; }
  .oc-pnode.run .pn-mk{ border-color: var(--accent); color: var(--accent); }
  .oc-pnode.pending{ opacity:.55; }
  .oc-pnode .pn-conn{ position:absolute; right:-6px; top:50%; transform:translateY(-50%); font-family:var(--font-mono); color:var(--ink-faint); z-index:2; font-size:12px; }

  /* generic surface */
  .oc-card{ background: var(--card); border:1.5px solid var(--ink); border-radius: var(--r-md); box-shadow: var(--shadow-rest); }
  .oc-card.soft{ border-color: var(--ink-line); box-shadow:none; }
  .oc-h{ font-size: 13px; font-weight:600; color: var(--ink); }
  .oc-sub{ font-size: 12.5px; color: var(--ink-soft); }
  .oc-divider{ height:1.5px; background: var(--ink-line); }

  /* footer note on each artboard */
  .oc-foot{ font-size:12px; color:var(--ink-soft); line-height:1.45; }
  .oc-foot b{ color:var(--ink); }
  .oc-foot .tag{ font-family:var(--font-mono); font-size:10px; letter-spacing:.06em; text-transform:uppercase; color:var(--ink-faint); }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="consoles/variation-a.js"></script>
<script type="text/babel" src="consoles/variation-b.js"></script>
<script type="text/babel" src="consoles/variation-c.js"></script>
<script type="text/babel">
const { DesignCanvas, DCSection, DCArtboard } = window;

function Board({ html }){
  return <div className="oc clean" style={{width:'100%',height:'100%'}} dangerouslySetInnerHTML={{__html: html}} />;
}

function App(){
  return (
    <DesignCanvas>
      <DCSection id="console" title="Console / Ask" subtitle="Hi-fi layout directions · same state shown: intent matched (0.92) + plan executing">
        <DCArtboard id="varA" label="A · Vertical flow" width={1380} height={940}>
          <Board html={window.OC_VAR_A} />
        </DCArtboard>
        <DCArtboard id="varB" label="B · Split workspace" width={1380} height={940}>
          <Board html={window.OC_VAR_B} />
        </DCArtboard>
        <DCArtboard id="varC" label="C · Pipeline console" width={1380} height={940}>
          <Board html={window.OC_VAR_C} />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
